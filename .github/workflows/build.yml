name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-rocksdb:
    strategy:
      fail-fast: false
      matrix: &platform-matrix
        platform: [win-x64, win-arm64, linux-x64, linux-arm64, macos-x64, macos-arm64]
        include:
          - platform: win-x64
            os: windows-latest
            triplet: x64-windows-release
            lib_files: "bin/{rocksdb-shared.dll,zlib1.dll,snappy.dll}"

          - platform: win-arm64
            os: windows-11-arm
            triplet: arm64-windows-release
            lib_files: "bin/{rocksdb-shared.dll,zlib1.dll,snappy.dll}"

          - platform: linux-x64
            os: ubuntu-latest
            triplet: x64-linux-dynamic-release
            lib_files: lib/{librocksdb.so.11,libz.so.1,libsnappy.so.1}

          - platform: linux-arm64
            os: ubuntu-24.04-arm
            triplet: arm64-linux-dynamic-release
            lib_files: lib/{librocksdb.so.11,libz.so.1,libsnappy.so.1}

          - platform: osx-x64
            os: macos-latest
            triplet: x64-osx-dynamic-release
            lib_files: lib/{librocksdb.11.dylib,libz.1.dylib,libsnappy.1.dylib}

          - platform: osx-arm64
            os: macos-latest
            triplet: arm64-osx-dynamic-release
            lib_files: lib/{librocksdb.11.dylib,libz.1.dylib,libsnappy.1.dylib}

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/buildRocksDb
        with:
          vcpkgTriplet: ${{ matrix.triplet }}
          runtimeId: ${{ matrix.platform }}
          libraryFiles: ${{ matrix.lib_files }}          

  build-rocksdb-musl:
    strategy:
      fail-fast: false
      matrix: &platform-matrix-musl
        platform: [linux-musl-x64, linux-musl-arm64]
        include:
          - platform: linux-musl-x64
            os: ubuntu-latest
            triplet: x64-linux-dynamic-release
            lib_files: lib/{librocksdb.so.11,libz.so.1,libsnappy.so.1}

          - platform: linux-musl-arm64
            os: ubuntu-24.04-arm
            triplet: arm64-linux-dynamic-release
            lib_files: lib/{librocksdb.so.11,libz.so.1,libsnappy.so.1}

    runs-on: ${{ matrix.os }}
    container: alpine:latest
    steps:
      # action/checkout fails on Alpine Arm64 without this fix
      - name: Fix Alpine arm64 compatibility
        if: matrix.platform == 'linux-musl-arm64'
        uses: laverdet/alpine-arm64@v1

      - uses: actions/checkout@v6

      - uses: ./.github/actions/buildRocksDb
        with:
          vcpkgTriplet: ${{ matrix.triplet }}
          runtimeId: ${{ matrix.platform }}
          libraryFiles: ${{ matrix.lib_files }}

  build-nupkg:
    needs: [build-rocksdb, build-rocksdb-musl]
    runs-on: ubuntu-latest
    if: always() && needs.build-rocksdb.result == 'success' && needs.build-rocksdb-musl.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Download all native library artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: runtimes-*
          path: RocksDb.Net.Runtimes/runtimes
          merge-multiple: true

      - name: Pack NuGet package
        shell: bash
        run: |
          dotnet pack -c Release -o nupkgs

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: nupkgs/*.nupkg

  validate-nupkg:
    needs: [build-nupkg]
    if: always() && needs.build-nupkg.result == 'success'
    strategy:
      fail-fast: false
      #max-parallel: 1
      matrix: *platform-matrix

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/validateNupkg
        with:
          runtimeId: ${{ matrix.platform }}

  validate-nupkg-musl:
    needs: [build-nupkg]
    if: always() && needs.build-nupkg.result == 'success'
    strategy:
      fail-fast: false
      matrix: *platform-matrix-musl

    runs-on: ${{ matrix.os }}
    container: alpine:latest
    steps:
      # action/checkout fails on Alpine Arm64 without this fix
      - name: Fix Alpine arm64 compatibility
        if: matrix.platform == 'linux-musl-arm64'
        uses: laverdet/alpine-arm64@v1

      - uses: actions/checkout@v6

      - uses: ./.github/actions/validateNupkg
        with:
          runtimeId: ${{ matrix.platform }}
