name: RocksDb.Net.Runtimes

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build-rocksdb:
    strategy:
      fail-fast: false
      #max-parallel: 1
      matrix:
        platform: [linux-x64, linux-arm64, windows-x64, windows-arm64, macos-x64, macos-arm64]
        include:
          - platform: linux-x64
            os: ubuntu-latest
            triplet: x64-linux-dynamic-release
            lib_files: lib/{librocksdb.so,libz.so.1,libsnappy.so.1}
            runtime_arch: linux-x64

          - platform: linux-arm64
            os: ubuntu-24.04-arm
            triplet: arm64-linux-dynamic-release
            lib_files: lib/{librocksdb.so,libz.so.1,libsnappy.so.1}
            runtime_arch: linux-arm64

          - platform: windows-x64
            os: windows-latest
            triplet: x64-windows-release
            lib_files: "bin/{rocksdb-shared.dll,zlib1.dll,snappy.dll}"
            runtime_arch: win-x64

          - platform: windows-arm64
            os: windows-11-arm
            triplet: arm64-windows-release
            lib_files: "bin/{rocksdb-shared.dll,zlib1.dll,snappy.dll}"
            runtime_arch: win-arm64

          - platform: macos-x64
            os: macos-latest
            triplet: x64-osx-dynamic-release
            lib_files: lib/{librocksdb.dylib,libz.1.dylib,libsnappy.1.dylib}
            runtime_arch: osx-x64

          - platform: macos-arm64
            os: macos-latest
            triplet: arm64-osx-dynamic-release
            lib_files: lib/{librocksdb.dylib,libz.1.dylib,libsnappy.1.dylib}
            runtime_arch: osx-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "afeb285c9e2e015292985856b9382ea1d82a4492"

      - name: Build rocksdb
        shell: bash
        run: |
          export ROCKSDB_VERSION_CSPROJ=$(awk 'match($0,/<RocksDbVersion>([^<]*)/,m) {print m[1]}' RocksDb.Net.Runtime.csproj.template)
          echo "Expected version: $ROCKSDB_VERSION_CSPROJ"
          ROCKSDB_VERSION=$(awk 'match($0,/"version": "([^"]*)/,m) {print m[1]}' vcpkg/ports/rocksdb/vcpkg.json )
          echo "RocksDB version in vcpkg: $ROCKSDB_VERSION"
          if [[ "$ROCKSDB_VERSION" != "$ROCKSDB_VERSION_CSPROJ" ]]; then
            echo "Version mismatch! Version in csproj ($ROCKSDB_VERSION_CSPROJ) does not match vcpkg version ($ROCKSDB_VERSION)."
            exit 1
          fi
          echo "Ok"
          false

          vcpkg install rocksdb[snappy,zlib] --triplet=${{ matrix.triplet }} --overlay-triplets=vcpkg-overlays/triplets
          find vcpkg/installed/${{ matrix.triplet }}

      - name: Copy to runtimes
        shell: bash
        run: |
          mkdir -p runtimes/${{ matrix.runtime_arch }}/native
          cp -L vcpkg/installed/${{ matrix.triplet }}/${{ matrix.lib_files }} runtimes/${{ matrix.runtime_arch }}/native/

      - name: Upload native library artifact
        uses: actions/upload-artifact@v7
        with:
          name: runtimes-${{ matrix.platform }}
          path: runtimes

  build-nupkg:
    needs: [build-rocksdb]
    runs-on: ubuntu-latest
    if: always() && needs.build-rocksdb.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Download all native library artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: runtimes-*
          path: runtimes
          merge-multiple: true

      - name: Pack NuGet package
        shell: bash
        run: |
          ls -lR runtimes
          dotnet pack -c Release -o nupkgs

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: nupkgs/*.nupkg

      # Publish to NuGet.org only on release events
      - name: Publish to NuGet.org
        if: github.event_name == 'release'
        shell: bash
        run: |
          # Extract version from tag
          vertag=(${GITHUB_REF//\// })
          VERSION="${vertag[2]}"
          [[ "${VERSION:0:1}" == "v" ]] && VERSION="${VERSION:1}"
          # Extract expected version from csproj template to ensure it matches the tag version
          VERSION_CSPROJ=$(awk 'match($0,/<Version>([^<]*)/,m) {print m[1]}' RocksDb.Net.Runtime.csproj.template)
          # Check if the version from the tag matches the expected version from the csproj template
          if [[ "$VERSION" != "$VERSION_CSPROJ" ]]; then
            echo "Version mismatch! Tag version ($VERSION) does not match csproj version ($VERSION_CSPROJ)."
            exit 1
          fi
          dotnet nuget push nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate