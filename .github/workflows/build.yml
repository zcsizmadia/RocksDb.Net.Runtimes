name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-rocksdb:
    strategy:
      fail-fast: false
      #max-parallel: 1
      matrix: &platforms_matrix
        platform: [linux-x64, linux-arm64, windows-x64, windows-arm64, macos-x64, macos-arm64]
        include:
          - platform: linux-x64
            os: ubuntu-latest
            triplet: x64-linux-dynamic-release
            lib_files: lib/{librocksdb.so.11,libz.so.1,libsnappy.so.1}
            runtime_arch: linux-x64

          - platform: linux-arm64
            os: ubuntu-24.04-arm
            triplet: arm64-linux-dynamic-release
            lib_files: lib/{librocksdb.so.11,libz.so.1,libsnappy.so.1}
            runtime_arch: linux-arm64

          - platform: windows-x64
            os: windows-latest
            triplet: x64-windows-release
            lib_files: "bin/{rocksdb-shared.dll,zlib1.dll,snappy.dll}"
            runtime_arch: win-x64

          - platform: windows-arm64
            os: windows-11-arm
            triplet: arm64-windows-release
            lib_files: "bin/{rocksdb-shared.dll,zlib1.dll,snappy.dll}"
            runtime_arch: win-arm64

          - platform: macos-x64
            os: macos-latest
            triplet: x64-osx-dynamic-release
            lib_files: lib/{librocksdb.11.dylib,libz.1.dylib,libsnappy.1.dylib}
            runtime_arch: osx-x64

          - platform: macos-arm64
            os: macos-latest
            triplet: arm64-osx-dynamic-release
            lib_files: lib/{librocksdb.11.dylib,libz.1.dylib,libsnappy.1.dylib}
            runtime_arch: osx-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "afeb285c9e2e015292985856b9382ea1d82a4492"

      - name: Check rocksdb version
        shell: bash
        run: |
          # Extract rocksdb version from csproj
          VERSION_ROCKSDB_CSPROJ="$(dotnet msbuild RocksDb.Net.Runtimes/ -getProperty:RocksDbVersion -nologo -v:q | tr -d '\r' | xargs)"
          echo "Version from csproj: $VERSION_ROCKSDB_CSPROJ"

          # Extract version from vcpkg.json
          VERSION_ROCKSDB=$(sed -n 's/.*"version": "\(.*\)".*/\1/p' vcpkg/ports/rocksdb/vcpkg.json)
          echo "Version from vcpkg.json: $VERSION_ROCKSDB"

          # Check if VERSION_ROCKSDB is the same as VERSION_ROCKSDB_CSPROJ
          if [[ "$VERSION_ROCKSDB" != "$VERSION_ROCKSDB_CSPROJ" ]]; then
            echo "Version mismatch! Tag version ($VERSION_ROCKSDB) does not match csproj version ($VERSION_ROCKSDB_CSPROJ)."
            exit 1
          fi

      - name: Build rocksdb
        shell: bash
        run: |
          vcpkg install rocksdb[snappy,zlib] --triplet=${{ matrix.triplet }} --overlay-triplets=vcpkg-overlays/triplets

      - name: Copy to runtimes
        shell: bash
        run: |
          mkdir -p RocksDb.Net.Runtimes/runtimes/${{ matrix.runtime_arch }}/native
          cp -L vcpkg/installed/${{ matrix.triplet }}/${{ matrix.lib_files }} RocksDb.Net.Runtimes/runtimes/${{ matrix.runtime_arch }}/native/

      - name: Post-process native binaries
        run: |
          LIB_DIR="RocksDb.Net.Runtimes/runtimes/${{ matrix.runtime_arch }}/native"
          ROCKSDB_MAJOR_VERSION="11"
          
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            TARGET_LIB="$LIB_DIR/librocksdb.so.$ROCKSDB_MAJOR_VERSION"
            patchelf --set-rpath '$ORIGIN' "$TARGET_LIB"

            # Check for missing dependencies using ldd. If any "not found" entries are present, fail the build.
            ldd $LIB_DIR/* | tee ldd_output.txt
            if grep -q "not found" ldd_output.txt; then
              echo "Error: Missing dependencies detected in Linux binaries!"
              exit 1
            fi

          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            TARGET_LIB_FILE="librocksdb.$ROCKSDB_MAJOR_VERSION.dylib"
            TARGET_LIB="$LIB_DIR/$TARGET_LIB_FILE"

            # Dynamically find and fix Snappy dependency. Search for 'libsnappy.1.' followed by versioning
            OLD_SNAPPY=$(otool -L "$TARGET_LIB" | grep -o "@rpath/libsnappy\.1\.[0-9.]*dylib" | head -n 1)
            if [ ! -z "$OLD_SNAPPY" ]; then
              install_name_tool -change "$OLD_SNAPPY" "@loader_path/libsnappy.1.dylib" "$TARGET_LIB"
            fi

            # Dynamically find and fix Zlib dependency. Search for 'libz.1.' followed by versioning
            OLD_ZLIB=$(otool -L "$TARGET_LIB" | grep -E -o "@rpath/libz\.1\.[0-9.]*dylib" | head -n 1)
            if [ ! -z "$OLD_ZLIB" ]; then
              install_name_tool -change "$OLD_ZLIB" "@loader_path/libz.1.dylib" "$TARGET_LIB"
            fi

            # Standardize internal IDs (Self-Identity)
            # This ensures the files identify as the names we expect

            install_name_tool -id "@rpath/$TARGET_LIB_FILE" "$TARGET_LIB"
            install_name_tool -id "@rpath/libsnappy.1.dylib" "$LIB_DIR/libsnappy.1.dylib"
            install_name_tool -id "@rpath/libz.1.dylib" "$LIB_DIR/libz.1.dylib"

            for lib in $LIB_DIR/*; do
              otool -L "$lib"
            done

            else
              echo "Skipping post-processing on Windows since it uses dynamic linking."
          fi

      # - name: Post-process macOS binaries
      #   if: runner.os == 'macOS'
      #   shell: bash
      #   run: |
      #     LIB_DIR="RocksDb.Net.Runtimes/runtimes/${{ matrix.runtime_arch }}/native"
      #     TARGET_LIB="$LIB_DIR/librocksdb.11.dylib"

      #     echo "Analyzing dependencies for $TARGET_LIB..."

      #     # 1. Dynamically find and fix Snappy dependency
      #     OLD_SNAPPY=$(otool -L "$TARGET_LIB" | grep -o "@rpath/libsnappy\.[0-9.]*dylib" | head -n 1)
      #     if [ ! -z "$OLD_SNAPPY" ]; then
      #       echo "Found Snappy link: $OLD_SNAPPY -> Redirecting to @loader_path/libsnappy.1.dylib"
      #       install_name_tool -change "$OLD_SNAPPY" "@loader_path/libsnappy.1.dylib" "$TARGET_LIB"
      #     fi

      #     # 2. Dynamically find and fix Zlib dependency
      #     # Search for 'libz' followed by versioning
      #     OLD_ZLIB=$(otool -L "$TARGET_LIB" | grep -E -o "@rpath/libz\.[0-9.]*dylib" | head -n 1)
      #     if [ ! -z "$OLD_ZLIB" ]; then
      #       echo "Found Zlib link: $OLD_ZLIB -> Redirecting to @loader_path/libz.1.dylib"
      #       install_name_tool -change "$OLD_ZLIB" "@loader_path/libz.1.dylib" "$TARGET_LIB"
      #     fi

      #     # 3. Standardize internal IDs (Self-Identity)
      #     # This ensures the files identify as the names we expect
      #     install_name_tool -id "@rpath/librocksdb.11.dylib" "$TARGET_LIB"
          
      #     if [ -f "$LIB_DIR/libsnappy.1.dylib" ]; then
      #       install_name_tool -id "@rpath/libsnappy.1.dylib" "$LIB_DIR/libsnappy.1.dylib"
      #     fi

      #     if [ -f "$LIB_DIR/libz.1.dylib" ]; then
      #       install_name_tool -id "@rpath/libz.1.dylib" "$LIB_DIR/libz.1.dylib"
      #     fi

      #     echo "Post-processing complete. Verified links:"
      #     otool -L "$TARGET_LIB"

      - name: Check if native libs are loadable
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            # Run ldd and grep for "not found". If found, exit with error.
            ldd RocksDb.Net.Runtimes/runtimes/${{ matrix.runtime_arch }}/native/* | tee ldd_output.txt
            if grep -q "not found" ldd_output.txt; then
              echo "Error: Missing dependencies detected in Linux binaries!"
              exit 1
            fi
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            for lib in RocksDb.Net.Runtimes/runtimes/${{ matrix.runtime_arch }}/native/*; do
              echo "Checking $lib..."
              otool -L "$lib"
            done
          else
            echo "Skipping dependency check on Windows since it uses dynamic linking."
          fi

      - name: Upload native library artifact
        uses: actions/upload-artifact@v7
        with:
          name: runtimes-${{ matrix.platform }}
          path: RocksDb.Net.Runtimes/runtimes

  build-nupkg:
    needs: [build-rocksdb]
    runs-on: ubuntu-latest
    if: always() && needs.build-rocksdb.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Download all native library artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: runtimes-*
          path: RocksDb.Net.Runtimes/runtimes
          merge-multiple: true

      - name: Pack NuGet package
        shell: bash
        run: |
          dotnet pack -c Release -o nupkgs

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: nupkgs/*.nupkg

  validate-nupkg:
    needs: [build-nupkg]
    if: always() && needs.build-nupkg.result == 'success'
    strategy:
      fail-fast: false
      #max-parallel: 1
      matrix: *platforms_matrix

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Download NuGet package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: nuget-package
          path: nupkgs

      - name: Run NupkgValidator
        shell: bash
        run: |
          cd NupkgValidator
          dotnet restore --source ../nupkgs
          dotnet build --no-restore
          dotnet run --no-build
