name: 'Build RocksDb'
description: 'Builds the native RocksDb libraries for all supported platforms using vcpkg and uploads them as artifacts for use in packaging the NuGet.' 

inputs:
  runtimeId:
    description: 'The runtime identifier (RID) to build for, e.g. linux-x64, win-x64, osx-arm64, etc.'
    required: true

runs:
  using: "composite"
  steps:
    # Install packages needed for building and testing the native libraries.
    - name: Install packages
      shell: sh
      run: |
        if [ -f /etc/alpine-release ]; then
          apk add --no-cache build-base cmake git ninja curl zip unzip tar bash icu pkgconf patchelf perl linux-headers
        fi

    - name: Install vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: "afeb285c9e2e015292985856b9382ea1d82a4492"

    # Install .NET SDKs to extract the RocksDB version from the csproj file,
    # which is used to ensure the vcpkg version matches and to determine the expected library file names
    - name: Install .NET SDKs
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x

    - name: Check RocksDb version
      shell: bash
      run: |
        # Extract rocksdb version from csproj
        ROCKSDB_VERSION_CSPROJ="$(dotnet msbuild RocksDb.Net.Runtimes/ -getProperty:RocksDbVersion -nologo -v:q | tr -d '\r' | xargs)"
        echo "RocksDb version from csproj: $ROCKSDB_VERSION_CSPROJ"

        # Extract version from vcpkg.json
        ROCKSDB_VERSION_VCPKG=$(sed -n 's/.*"version": "\(.*\)".*/\1/p' vcpkg/ports/rocksdb/vcpkg.json)
        echo "RocksDb version from vcpkg.json: $ROCKSDB_VERSION_VCPKG"

        # Check if ROCKSDB_VERSION_VCPKG is the same as ROCKSDB_VERSION_CSPROJ
        if [[ "$ROCKSDB_VERSION_VCPKG" != "$ROCKSDB_VERSION_CSPROJ" ]]; then
          echo "RocksDb version mismatch! Tag version ($ROCKSDB_VERSION_VCPKG) does not match csproj version ($ROCKSDB_VERSION_CSPROJ)."
          exit 1
        fi

        ROCKSDB_VERSION_MAJOR="${ROCKSDB_VERSION_VCPKG%%.*}"

        echo "ROCKSDB_VERSION=$ROCKSDB_VERSION_CSPROJ" | tee -a $GITHUB_ENV
        echo "ROCKSDB_VERSION_MAJOR=$ROCKSDB_VERSION_MAJOR" | tee -a $GITHUB_ENV

    - name: Build RocksDb native libraries using vcpkg
      shell: bash
      env:
        VCPKG_FORCE_SYSTEM_BINARIES: ${{ contains(inputs.runtimeId, 'musl') && 1 || 0}}
      run: |
        vcpkg install rocksdb[snappy,zlib] --triplet=${{ inputs.runtimeId }} --overlay-triplets=vcpkg-overlays/triplets
        find vcpkg/installed/${{ inputs.runtimeId }}

    - name: Copy to runtimes
      shell: bash
      run: |
        TARGET_DIR="RocksDb.Net.Runtimes/runtimes/${{ inputs.runtimeId }}/native"

        # Create the target directory for the native libraries in the runtimes folder
        mkdir -p "$TARGET_DIR"

        case "${{ inputs.runtimeId }}" in
          win-*)
            # cp -L vcpkg/installed/${{ inputs.runtimeId }}/bin/rocksdb-shared.dll "$TARGET_DIR"
            # cp -L vcpkg/installed/${{ inputs.runtimeId }}/bin/snappy.dll "$TARGET_DIR"
            # cp -L vcpkg/installed/${{ inputs.runtimeId }}/bin/zlib1.dll "$TARGET_DIR"

            cp -L vcpkg/installed/${{ inputs.runtimeId }}/bin/*.dll "$TARGET_DIR"
            ;;
          linux-*)
            # cp -L vcpkg/installed/${{ inputs.runtimeId }}/lib/librocksdb.so.$ROCKSDB_VERSION_MAJOR "$TARGET_DIR"
            # cp -L vcpkg/installed/${{ inputs.runtimeId }}/lib/libsnappy.so.1 "$TARGET_DIR"
            # cp -L vcpkg/installed/${{ inputs.runtimeId }}/lib/libz.so.1 "$TARGET_DIR"

            # Dynamically find and copy all .so files that match the expected naming pattern (e.g. librocksdb.so.MAJOR, libsnappy.so.MAJOR, libz.so.MAJOR)
            find "vcpkg/installed/${{ inputs.runtimeId }}/lib" -maxdepth 1 -name "lib*.so.*" | grep -E '/lib[^.]+\.so\.[0-9]+$' | xargs -I {} cp -L {} "$TARGET_DIR/"
            ;;
          osx-*)
            # cp -L vcpkg/installed/${{ inputs.runtimeId }}/lib/librocksdb.$ROCKSDB_VERSION_MAJOR.dylib "$TARGET_DIR"
            # cp -L vcpkg/installed/${{ inputs.runtimeId }}/lib/libsnappy.1.dylib "$TARGET_DIR"
            # cp -L vcpkg/installed/${{ inputs.runtimeId }}/lib/libz.1.dylib "$TARGET_DIR"

            # Dynamically find and copy all .dylib files that match the expected naming pattern (e.g. librocksdb.MAJOR.dylib, libsnappy.MAJOR.dylib, libz.MAJOR.dylib)
            find "vcpkg/installed/${{ inputs.runtimeId }}/lib" -maxdepth 1 -name "*.dylib" | grep -E '/lib[^.]+\.[0-9]+\.dylib$' | xargs -I {} cp -L {} "$TARGET_DIR/"
            ;;
          *)
            echo "Unsupported platform: ${{ inputs.runtimeId }}"
            exit 1
            ;;
        esac

        ls -l RocksDb.Net.Runtimes/runtimes/${{ inputs.runtimeId }}/native/

    - name: Post-process Linux native binaries
      if: runner.os == 'Linux'
      shell: bash
      run: |
        TARGET_DIR="RocksDb.Net.Runtimes/runtimes/${{ inputs.runtimeId }}/native"

        # Patchelf to set RPATH to $ORIGIN for all .so files in the target directory.
        # This ensures that the native libraries will look for their dependencies in the same directory,
        # which is necessary for them to work correctly when loaded from the NuGet package.
        for lib in "$TARGET_DIR"/*.so.*; do
          [ -e "$lib" ] || continue
          echo "Setting RPATH for $(basename "$lib")"
          patchelf --set-rpath '$ORIGIN' "$lib"
        done

        # Verify the RPATH is set correctly in the logs
        ldd "$TARGET_DIR"/librocksdb.so*

    - name: Post-process macOS native binaries
      if: runner.os == 'macOS'
      shell: bash
      run: |
        TARGET_DIR="RocksDb.Net.Runtimes/runtimes/${{ inputs.runtimeId }}/native"

        # 1. Standardize all internal IDs (Self-Identity)
        # This makes every lib identify as @rpath/filename.dylib
        for lib in "$TARGET_DIR"/*.dylib; do
          [ -e "$lib" ] || continue
          LIB_NAME=$(basename "$lib")
          echo "Setting ID for $LIB_NAME"
          install_name_tool -id "@rpath/$LIB_NAME" "$lib"
        done

        # 2. Dynamically fix dependencies between libraries
        # We look for any dependency currently starting with @rpath and 
        # change it to @loader_path so they find each other in the same folder.
        for lib in "$TARGET_DIR"/*.dylib; do
          [ -e "$lib" ] || continue
          echo "Processing dependencies for $(basename "$lib")"
          
          # List dependencies, find those using @rpath (excluding self), and loop them
          otool -L "$lib" | grep "@rpath/" | grep -v "$(basename "$lib")" | awk '{print $1}' | while read -r OLD_DEP; do
            # Extract the base name (e.g., libsnappy.1.dylib) from the complex path
            # This handles cases like e.g. @rpath/libsnappy.1.1.10.dylib -> libsnappy.1.dylib
            # as long as your copy step renamed the file to the major version.
            DEP_BASE=$(basename "$OLD_DEP")
            
            # Check if we have a matching major-version file in our directory
            # E.g. if libsnappy.1.1.10.dylib is requested, we map it to libsnappy.1.dylib
            MATCHING_LIB=$(ls "$TARGET_DIR" | grep "${DEP_BASE%%.*}" | grep -E "\.[0-9]+\.dylib$" | head -n 1)
            
            if [ -n "$MATCHING_LIB" ]; then
              echo "  Changing $OLD_DEP -> @loader_path/$MATCHING_LIB"
              install_name_tool -change "$OLD_DEP" "@loader_path/$MATCHING_LIB" "$lib"
            fi
          done
        done
        # set -x

        # TARGET_DIR="RocksDb.Net.Runtimes/runtimes/${{ inputs.runtimeId }}/native"
        # TARGET_LIB_FILE_NAME="librocksdb.$ROCKSDB_VERSION_MAJOR.dylib"
        # TARGET_LIB="$TARGET_DIR/$TARGET_LIB_FILE_NAME"

        # echo "BEFORE:"
        # for lib in $TARGET_DIR/*; do
        #   otool -L "$lib"
        # done

        # echo "AFTER:"
        # # Dynamically find and fix Snappy dependency. Search for 'libsnappy.1.' followed by versioning
        # OLD_SNAPPY=$(otool -L "$TARGET_LIB" | grep -o "@rpath/libsnappy\.1\.[0-9.]*dylib" | head -n 1)
        # if [ ! -z "$OLD_SNAPPY" ]; then
        #   install_name_tool -change "$OLD_SNAPPY" "@loader_path/libsnappy.1.dylib" "$TARGET_LIB"
        # fi

        # # Dynamically find and fix Zlib dependency. Search for 'libz.1.' followed by versioning
        # OLD_ZLIB=$(otool -L "$TARGET_LIB" | grep -E -o "@rpath/libz\.1\.[0-9.]*dylib" | head -n 1)
        # if [ ! -z "$OLD_ZLIB" ]; then
        #   install_name_tool -change "$OLD_ZLIB" "@loader_path/libz.1.dylib" "$TARGET_LIB"
        # fi

        # # Standardize internal IDs (Self-Identity)
        # # This ensures the files identify as the names we expect

        # install_name_tool -id "@rpath/$TARGET_LIB_FILE_NAME" "$TARGET_LIB"
        # install_name_tool -id "@rpath/libsnappy.1.dylib" "$TARGET_DIR/libsnappy.1.dylib"
        # install_name_tool -id "@rpath/libz.1.dylib" "$TARGET_DIR/libz.1.dylib"

        # for lib in $TARGET_DIR/*; do
        #   otool -L "$lib"
        # done

        for lib in "RocksDb.Net.Runtimes/runtimes/${{ inputs.runtimeId }}/native/*.dylib"; do
           otool -L "$lib"
        done

    - name: Upload native library artifact
      uses: actions/upload-artifact@v7
      with:
        name: runtimes-${{ inputs.runtimeId }}
        path: RocksDb.Net.Runtimes/runtimes
